services:
  - type: web
    name: impact-rdc
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_ADMIN_USERNAME
        sync: false
      - key: VITE_ADMIN_PASSWORD
        sync: false
      - key: VITE_REVIEWER_CODE
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
